# VisionMeta Nginx config (example)
# Replace example.com with your domain and update cert paths.

# Redirect HTTP to HTTPS
server {
  listen 80;
  server_name example.com www.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name example.com www.example.com;

  # TLS certs (use Let's Encrypt or your provider)
  ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  root /var/www/visionmeta/dist;
  index index.html;

  access_log /var/log/nginx/visionmeta.access.log;
  error_log /var/log/nginx/visionmeta.error.log warn;

  gzip on;
  gzip_min_length 512;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_vary on;

  # Security headers
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-Content-Type-Options nosniff;
  add_header Referrer-Policy no-referrer-when-downgrade;
  add_header X-XSS-Protection "1; mode=block";
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  client_max_body_size 200M;

  # Proxy API calls to backend
  location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 120s;
  }

  # Shortcut to download route (proxied to server download endpoint)
  location /download {
    proxy_pass http://127.0.0.1:4000/api/download/latest;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  # Serve SPA
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively
  location ~* \.(?:css|js|jpg|jpeg|png|webp|svg|gif|ico|woff2|woff|ttf)$ {
    try_files $uri $uri/ =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  # Simple rate limiting
  limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;
  limit_req zone=one burst=20 nodelay;

  # Deny access to sensitive files
  location ~* (?:\.env|composer\.json|package\.json|tsconfig\.json)$ {
    deny all;
  }
}
# VisionMeta Nginx configuration
# Place in /etc/nginx/sites-available/visionmeta.conf and symlink to sites-enabled
# Replace example.com and cert paths with your domain and actual certificate paths

upstream visionmeta_backend {
  server 127.0.0.1:4000;
}

server {
  listen 80;
  server_name example.com www.example.com;
  # Redirect all HTTP to HTTPS
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name example.com www.example.com;

  # TLS certs (Let's Encrypt example)
  ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  root /var/www/visionmeta/dist;
  index index.html;

  access_log /var/log/nginx/visionmeta.access.log;
  error_log /var/log/nginx/visionmeta.error.log warn;

  # Basic performance
  gzip on;
  gzip_comp_level 5;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_vary on;

  # Security headers
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-Content-Type-Options nosniff;
  add_header Referrer-Policy no-referrer-when-downgrade;
  add_header X-XSS-Protection "1; mode=block";
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  client_max_body_size 200M;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

  # Proxy API requests to backend
  location /api/ {
    proxy_pass http://visionmeta_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 180s;
  }

  # Expose a friendly download path that proxies to the backend endpoint
  location /download {
    proxy_pass http://visionmeta_backend/api/download/latest;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  # Serve frontend (SPA) and fallback to index.html for client-side routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long cache for static assets
  location ~* \.(?:css|js|jpg|jpeg|png|webp|svg|gif|ico|woff2|woff|ttf)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  # Block access to sensitive files
  location ~* (?:\.env|composer\.json|package-lock\.json|tsconfig\.json)$ {
    deny all;
  }

  # Apply rate limiting
  limit_req zone=one burst=20 nodelay;
}
